# Render Blueprint — deploys the backend (Docker) and frontend (static) together.
# Docs: https://render.com/docs/blueprint-spec
#
# Create from the Render dashboard: New + -> Blueprint -> pick this repo.
# You will be prompted for the env vars marked "sync: false".

services:
  # --------------------------------------------------------------------------
  # Backend: FastAPI + LlamaIndex (Docker)
  # --------------------------------------------------------------------------
  - type: web
    name: docintel-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false              # secret — paste your real key in the dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: ENVIRONMENT
        value: production
      - key: AUTH_ENABLED
        value: "true"
      - key: API_KEYS
        sync: false              # e.g. a demo key you hand out
      - key: ADMIN_API_TOKEN
        sync: false              # enables /auth key management
      - key: CORS_ORIGINS
        value: "*"
    # NOTE: the free plan has NO persistent disk, so uploads, the vector index,
    # and the SQLite DB reset on each redeploy or cold start. Fine for a demo.
    # To persist data, change `plan` to `starter` and uncomment this disk:
    # disk:
    #   name: data
    #   mountPath: /app/data
    #   sizeGB: 1

  # --------------------------------------------------------------------------
  # Frontend: React/Vite static site
  # --------------------------------------------------------------------------
  - type: web
    name: docintel-frontend
    runtime: static
    rootDir: frontend
    # --include=dev so Vite/Tailwind (devDependencies) are installed for the build.
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false              # set to the backend URL, e.g.
                                 # https://docintel-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
